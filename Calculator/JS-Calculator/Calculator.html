<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
<style>
    h1{
        text-align: center;
        color: #d6f7ff;
        font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
        font-weight: bold;
        text-shadow: 2px 2px 8px #00092d;
    }
    /* Casio-style body */
    .formstyle{
        width: 340px;
        height: 550px;
        margin: 20px auto;
        border: 4px solid #222C30;
        border-radius: 18px 18px 30px 30px;
        background: linear-gradient(180deg, #223 70%, #12181e 100%);
        box-shadow: 0 10px 40px #10151e, 0 1.5px 0 #545b62;
        padding: 24px 18px 18px 18px;
        position: relative;
    }
    /* Casio-style display */
    #calc{
        width: 305px;
        height: 60px;
        margin: 0 auto 22px auto;
        border: 3px inset #b1b7c2;
        border-radius: 8px;
        background: linear-gradient(180deg, #e1e4eb 80%, #a7aab5 100%);
        color: #212f44;
        font-size: 2.2em;
        font-family: 'Digital-7', 'Consolas', monospace;
        text-align: right;
        letter-spacing: 2px;
        box-shadow: 0 2px 12px #222a34 inset;
        outline: none;
        padding: 12px 12px 0 0;
        margin-bottom: 0px;
        display: block;
    }
    /* General Button Style */
    input[type="button"]{
        height: 44px;
        width: 52px;
        background-color: #222b2d;
        color: #e5eaea;
        border: 2px solid #555a60;
        border-radius: 13px;
        margin: 5px 15px;
        font-size: 1.2em;
        font-family: 'Orbitron', Arial, sans-serif;
        font-weight: 700;
        box-shadow: 0 2px 0 #181c1d, 0 1.5px 2px #414650 inset;
        transition: all 0.1s;
        outline: none;
        cursor: pointer;
    }
    /* Operators [+, -, ×, ÷] */
    .op {
        background: #2a51ac;
        color: #fffefa;
        border-color: #2159b0;
    }
    /* Equals (=) */
    .eq {
        background: #258dbe;
        color: #fff;
        border-color: #147097;
    }
    /* AC/C (Clear - Red/Orange) */
    #clear{
        width: 320px;
        background: #ff5545;
        color: #fff01b;
        border: 3px solid #8d200c;
        border-radius: 22px;
        padding: 14px 0;
        font-size: 1.1em;
        font-weight: bold;
        box-shadow: 0 2px #c53d29;
        margin: 15px 8px 14px 8px;
    }
    /* ON button (if present) */
    .on{
        background: #fea00a;
        color: #212121;
        border: 2px solid #a15b03;
    }
    /* Hover/Elevation Effects */
    #clear:hover, .eq:hover, .op:hover, .on:hover, input[type="button"]:hover{
        background-color: #b8e026;
        color: #151718;
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 4px 16px #202e42cc;
    }
    /* Remove outline blue on click */
    input[type="button"]:focus {
        outline: none;
    }
    /* Special styling for zero bar row (if present) */
    .zero-row input[type="button"] {
        width: 112px;
        border-radius: 22px;
    }
</style>
</head>
<body>
    <div class="formstyle">
        <!-- <h1>Calculator</h1> -->
        <form name="form1">
        <h1>Calculator</h1>

            <!-- This input box shows the button pressed by the user in calculator. -->
            <input type="text" id="calc" name="answer"><br><br>
            <!-- Display the calculator button on the screen. -->
            <!-- onclick() function display the number presses by the user. -->
            <input type="button" value="1" onclick="form1.answer.value +='1' ">
            <input type="button" value="2" onclick="form1.answer.value +='2' ">
            <input type="button" value="3" onclick="form1.answer.value +='3' ">
            <input type="button" value="+" onclick="form1.answer.value +='+' ">
            <br><br>
            <input type="button" value="4" onclick="form1.answer.value +='4' ">
            <input type="button" value="5" onclick="form1.answer.value +='5' ">
            <input type="button" value="6" onclick="form1.answer.value +='6' ">
            <input type="button" value="-" onclick="form1.answer.value +='-' ">
            <br><br>
            <input type="button" value="7" onclick="form1.answer.value +='7' ">
            <input type="button" value="8" onclick="form1.answer.value +='8' ">
            <input type="button" value="9" onclick="form1.answer.value +='9' ">
            <input type="button" value="*" onclick="form1.answer.value +='*' ">
            <br><br>
            <input type="button" value="/" onclick="form1.answer.value +='/' ">
            <input type="button" value="0" onclick="form1.answer.value +='0' ">
            <input type="button" value="." onclick="form1.answer.value +='.' ">
                <!-- When we click on the '=' button, the onclick() show the sum results on the calculator screen... -->
            <input type="button" value="=" onclick="form1.answer.value =eval(form1.answer.value) ">
            <br>
                <!-- Display the cancel button and erase all data entered by the user. -->
            <input type="button" value="Clear All" onclick="form1.answer.value ='' " id="clear">            
            <br>
        </form>
    </div>
</body>
</html>
